<style>
:root{--bg:#f5f6f8;--card:#fff;--card-hover:#f0f2f5;--border:#e4e8ec;--fg:#1a1a2e;--fg-dim:#7c8495;--accent:#10b981;--accent-light:#d1fae5;--accent-dark:#059669;--warn:#f59e0b;--warn-light:#fef3c7;--red:#ef4444;--red-light:#fee2e2;--blue:#3b82f6;--blue-light:#dbeafe;--purple:#8b5cf6;--orange:#f97316;--radius:14px;--radius-sm:10px}
.page{display:none}.page.active{display:block}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;top:0;left:0;right:0;height:280px;background:linear-gradient(180deg,#ecfdf5 0%,#f0fdf4 40%,var(--bg) 100%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 16px 40px}
.header{padding:16px 0 8px;position:sticky;top:0;z-index:100;background:rgba(245,246,248,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.header-top{display:flex;justify-content:space-between;align-items:center}
.market-name{font-size:20px;font-weight:900;letter-spacing:-.5px;color:#065f46}
.market-sub{font-size:11px;color:var(--fg-dim);margin-top:2px;font-weight:300}
.date-selector{display:flex;gap:6px;overflow-x:auto;padding:10px 0 6px;-ms-overflow-style:none;scrollbar-width:none}
.date-selector::-webkit-scrollbar{display:none}
.date-chip{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--fg-dim);font-size:12px;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
.date-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(16,185,129,.3)}
.date-chip:hover:not(.active){background:var(--card-hover);border-color:#cbd5e1}
.date-chip .wd{display:block;font-size:10px;font-weight:400;opacity:.7;margin-top:1px}
.revenue-hero{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px 20px;margin:10px 0 16px;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.revenue-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(16,185,129,.08) 0%,transparent 70%)}
.revenue-label{font-size:12px;color:var(--fg-dim);font-weight:400;letter-spacing:1px}
.revenue-amount{font-family:'DM Mono',monospace;font-size:42px;font-weight:500;color:var(--fg);margin:8px 0;letter-spacing:-2px;position:relative;z-index:1}
.revenue-amount .yen{font-size:22px;color:var(--accent);margin-right:2px;vertical-align:top;position:relative;top:8px}
.revenue-change{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500}
.revenue-change.up{background:var(--accent-light);color:var(--accent-dark)}
.revenue-change.down{background:var(--red-light);color:var(--red)}
.quick-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 12px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.stat-value{font-family:'DM Mono',monospace;font-size:20px;font-weight:500}
.stat-label{font-size:11px;color:var(--fg-dim);margin-top:4px}
.stat-value.accent{color:var(--accent-dark)}.stat-value.gold{color:var(--orange)}.stat-value.blue{color:var(--blue)}
.section{margin-bottom:22px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 2px}
.section-title{font-size:15px;font-weight:700;letter-spacing:-.3px}
.section-badge{font-size:10px;padding:2px 8px;border-radius:8px;background:var(--accent-light);color:var(--accent-dark);font-weight:500}
.period-row{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.period-tab{padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:var(--card);color:var(--fg-dim);font-size:11px;cursor:pointer;transition:all .15s;font-family:inherit}
.period-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.period-tab:hover:not(.active){background:var(--card-hover)}

<script>var D=JSON.parse(document.getElementById('app-data').textContent);
var WD=['日','一','二','三','四','五','六'];
var CC={'水果':{bg:'#fff7ed',fg:'#ea580c',c:'#f97316',ic:'🍎'},'蔬菜':{bg:'#f0fdf4',fg:'#16a34a',c:'#22c55e',ic:'🥬'},'肉类':{bg:'#fef2f2',fg:'#dc2626',c:'#ef4444',ic:'🥩'},'干货':{bg:'#faf5f0',fg:'#a16207',c:'#ca8a04',ic:'🥜'},'面点':{bg:'#fffbeb',fg:'#d97706',c:'#f59e0b',ic:'🥟'},'豆制品':{bg:'#fefce8',fg:'#ca8a04',c:'#eab308',ic:'🧈'},'粮油':{bg:'#fef9c3',fg:'#a16207',c:'#ca8a04',ic:'🫙'},'熟食':{bg:'#fff7ed',fg:'#ea580c',c:'#f97316',ic:'🍖'},'海鲜':{bg:'#ecfeff',fg:'#0891b2',c:'#06b6d4',ic:'🦐'},'酒水':{bg:'#faf5ff',fg:'#9333ea',c:'#a855f7',ic:'🍷'},'冻品':{bg:'#f8fafc',fg:'#475569',c:'#64748b',ic:'🧊'},'餐饮':{bg:'#fff7ed',fg:'#ea580c',c:'#fb923c',ic:'🍜'},'文具百货':{bg:'#fdf4f0',fg:'#c2410c',c:'#ea580c',ic:'📝'},'调料':{bg:'#fff1f2',fg:'#be123c',c:'#e11d48',ic:'🧂'},'折扣仓':{bg:'#f0fdfa',fg:'#0f766e',c:'#14b8a6',ic:'🏷️'},'其他':{bg:'#f9fafb',fg:'#6b7280',c:'#9ca3af',ic:'📦'}};
function gc(n){return CC[n]||CC['其他']}
function fn(n){return n.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2})}

var sum=D.daily_summary,dts=sum.map(function(s){return s.date}),cIdx=-1;
document.getElementById('periodLabel').textContent=D.period;
document.getElementById('updateTime').textContent=new Date().toLocaleString('zh-CN',{hour12:false});

var sel=document.getElementById('dateSelector');
dts.forEach(function(d,i){var dt=new Date(d),ch=document.createElement('button');ch.className='date-chip';ch.innerHTML=d.slice(5)+'<span class="wd">周'+WD[dt.getDay()]+'</span>';ch.onclick=function(){selDate(i)};sel.appendChild(ch)});

var tC=null,cP=null,cT=null;

function selDate(i){
  cIdx=i;
  var chips=sel.querySelectorAll('.date-chip');
  for(var j=0;j<chips.length;j++){chips[j].classList.toggle('active',j===i)}
  render(i);
}

selDate(dts.length-1);

function render(i){
  var dy=sum[i],tr=dy.total_revenue;
  var ti=0,to=0;
  Object.keys(dy.categories).forEach(function(cat){ti+=dy.categories[cat].income;to+=dy.categories[cat].orders});
  var td=tr-ti,dr=tr>0?(td/tr*100):0,ap=to>0?(ti/to):0;
  document.getElementById('heroAmount').textContent=fn(tr);
  document.getElementById('heroLabel').textContent=dy.date+' 营业额';
  if(i>0){
    var pv=sum[i-1].total_revenue,chg=pv>0?((tr-pv)/pv*100):0,up=chg>=0;
    document.getElementById('heroChange').innerHTML='<span class="revenue-change '+(up?'up':'down')+'">'+(up?'▲':'▼')+' 较昨日 '+(up?'+':'')+chg.toFixed(1)+'%</span><span style="font-size:11px;color:var(--fg-dim);margin-left:8px">昨日 ¥'+fn(pv)+'</span>';
  }else{
    document.getElementById('heroChange').innerHTML='<span style="font-size:11px;color:var(--fg-dim)">无前日对比</span>';
  }
  document.getElementById('statOrders').textContent=to.toLocaleString();
  document.getElementById('statAvg').textContent='¥'+ap.toFixed(0);
  document.getElementById('statDiscount').textContent=dr.toFixed(1)+'%';
  drawTrendChart(7);drawCatChart(1);drawCatList(1);drawCompChart(7);drawStoreRank(cIdx,cIdx);drawInsights(i,dy);
}

/* ========== 营收趋势 ========== */
function drawTrendChart(days){
  var start=days===0?0:Math.max(0,sum.length-days),lb=[],rv=[],ic=[];
  for(var i=start;i<sum.length;i++){
    lb.push(dts[i].slice(5));
    rv.push(sum[i].total_revenue);
    var inc=0;Object.values(sum[i].categories).forEach(function(c){inc+=c.income});
    ic.push(inc);
  }
  var ctx=document.getElementById('trendChart').getContext('2d');
  if(tC)tC.destroy();
  tC=new Chart(ctx,{type:'line',data:{labels:lb,datasets:[
    {label:'营业额',data:rv,borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.1)',borderWidth:2.5,fill:true,tension:.4,pointRadius:4,pointBackgroundColor:'#fff',pointBorderColor:'#10b981',pointBorderWidth:2,pointHoverRadius:6},
    {label:'实收',data:ic,borderColor:'#3b82f6',borderWidth:1.5,borderDash:[5,3],fill:false,tension:.4,pointRadius:0}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top',align:'end',labels:{color:'#7c8495',font:{size:11},boxWidth:12,padding:12,usePointStyle:true}},tooltip:{backgroundColor:'#1a1a2e',borderColor:'#e4e8ec',borderWidth:1,titleColor:'#fff',bodyColor:'#a0aec0',padding:10,cornerRadius:8,callbacks:{label:function(ctx){return ctx.dataset.label+': ¥'+fn(ctx.parsed.y)}}}},scales:{x:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#7c8495',font:{size:11}}},y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#7c8495',font:{size:11},callback:function(v){return'¥'+(v/1000).toFixed(0)+'k'}}}}}});
}

/* ========== 品类营业额（饼图） ========== */
function drawCatChart(days,startIdx,endIdx){
  var start,end;
  if(startIdx!==undefined&&endIdx!==undefined){start=startIdx;end=endIdx}
  else{start=days===0?0:Math.max(0,sum.length-days);end=sum.length-1}
  var cats={};
  for(var i=start;i<=end;i++){
    Object.keys(sum[i].categories).forEach(function(cat){
      if(!cats[cat])cats[cat]={revenue:0,income:0,orders:0,stores:[]};
      cats[cat].revenue+=sum[i].categories[cat].revenue;
      cats[cat].income+=sum[i].categories[cat].income;
      cats[cat].orders+=sum[i].categories[cat].orders;
      sum[i].categories[cat].stores.forEach(function(s){if(cats[cat].stores.indexOf(s)===-1)cats[cat].stores.push(s)});
    });
  }
  var es=Object.entries(cats).sort(function(a,b){return b[1].revenue-a[1].revenue});
  var totalRev=es.reduce(function(s,e){return s+e[1].revenue},0);
  var lb=es.map(function(e){return e[0]}),dt=es.map(function(e){return e[1].revenue}),cl=es.map(function(e){return gc(e[0]).c});
  document.getElementById('catBadge').textContent=es.length+' 个品类';
  var ctx=document.getElementById('catPie').getContext('2d');if(cP)cP.destroy();
  cP=new Chart(ctx,{type:'pie',data:{labels:lb,datasets:[{data:dt,backgroundColor:cl,borderColor:'#fff',borderWidth:3,hoverOffset:8}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',labels:{color:'#374151',font:{size:11},boxWidth:12,padding:10,usePointStyle:true,pointStyle:'circle'}},tooltip:{backgroundColor:'#1a1a2e',borderColor:'#e4e8ec',borderWidth:1,titleColor:'#fff',bodyColor:'#a0aec0',cornerRadius:8,padding:10,callbacks:{label:function(ctx){var p=(ctx.parsed/totalRev*100).toFixed(1);return ctx.label+': ¥'+fn(ctx.parsed)+' ('+p+'%)'}}}}}});
}

/* ========== 品类列表（可展开门店每日详情） ========== */
function drawCatList(days,startIdx,endIdx){
  var start,end;
  if(startIdx!==undefined&&endIdx!==undefined){start=startIdx;end=endIdx}
  else{start=days===0?0:Math.max(0,sum.length-days);end=sum.length-1}
  // Build category totals
  var cats={};
  for(var i=start;i<=end;i++){
    Object.keys(sum[i].categories).forEach(function(cat){
      if(!cats[cat])cats[cat]={revenue:0,stores:[]};
      cats[cat].revenue+=sum[i].categories[cat].revenue;
      sum[i].categories[cat].stores.forEach(function(s){if(cats[cat].stores.indexOf(s)===-1)cats[cat].stores.push(s)});
    });
  }
  var es=Object.entries(cats).sort(function(a,b){return b[1].revenue-a[1].revenue});
  var totalRev=es.reduce(function(s,e){return s+e[1].revenue},0),mx=es[0]?es[0][1].revenue:1;
  var dl=dts[start].slice(5)+'~'+dts[end].slice(5);
  var listEl=document.getElementById('catList');
  listEl.innerHTML='';
  es.forEach(function(e,idx){
    var n=e[0],d=e[1],c=gc(n),p=(d.revenue/totalRev*100).toFixed(1),b=(d.revenue/mx*100).toFixed(0);
    // Build store daily detail
    var storeData={};
    for(var i=start;i<=end;i++){
      sum[i].store_ranking.forEach(function(sr){
        if(sr.category===n){
          if(!storeData[sr.store])storeData[sr.store]={};
          storeData[sr.store][dts[i]]=sr.revenue;
        }
      });
    }
    var storeArr=Object.entries(storeData).map(function(s){
      var total=0,count=0;
      Object.values(s[1]).forEach(function(v){total+=v;count++});
      return{name:s[0],daily:s[1],total:total,avg:count>0?total/count:0};
    }).sort(function(a,b){return b.total-a.total});
    var maxStore=storeArr.length>0?storeArr[0].total:1;
    var detailHtml='<div class="cat-detail" id="catDetail_'+idx+'">';
    detailHtml+='<div style="font-size:11px;color:var(--fg-dim);margin-bottom:10px">'+n+' · '+storeArr.length+' 个门店每日明细</div>';
    storeArr.forEach(function(store,si){
      detailHtml+='<div style="margin-bottom:10px;'+(si>0?'padding-top:8px;border-top:1px dashed #e8e8e8':'')+'">';
      detailHtml+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:12px;font-weight:600;color:var(--fg)">'+store.name+'</span><span style="font-family:DM Mono;font-size:12px;color:'+c.fg+'">¥'+fn(store.total)+' · 日均 ¥'+fn(store.avg)+'</span></div>';
      var dailyKeys=Object.keys(store.daily).sort();
      var maxDay=0;dailyKeys.forEach(function(k){if(store.daily[k]>maxDay)maxDay=store.daily[k]});
      dailyKeys.forEach(function(date){
        var rev=store.daily[date],pct=maxDay>0?(rev/maxDay*100).toFixed(0):0;
        var dow=new Date(date).getDay();
        detailHtml+='<div style="display:flex;justify-content:space-between;font-size:11px;padding:2px 0"><span style="color:var(--fg-dim)">'+date.slice(5)+' 周'+WD[dow]+'</span><span style="font-family:DM Mono;color:var(--fg)">¥'+fn(rev)+'</span></div>';
        detailHtml+='<div class="cat-detail-bar"><div class="cat-detail-bar-fill" style="width:'+pct+'%;background:'+c.fg+'44"></div></div>';
      });
      detailHtml+='</div>';
    });
    detailHtml+='</div>';
    // Main item
    var itemHtml='<div class="cat-item expandable" data-idx="'+idx+'" onclick="toggleCatDetail('+idx+')">';
    itemHtml+='<div class="cat-icon" style="background:'+c.bg+'">'+c.ic+'</div>';
    itemHtml+='<div class="cat-info"><div class="cat-name">'+n+' <span class="cat-expand-arrow">▶</span></div><div class="cat-stores">'+d.stores.length+' 个摊位 · '+dl+'</div>';
    itemHtml+='<div class="cat-bar"><div class="cat-bar-fill" style="width:'+b+'%;background:'+c.fg+'"></div></div></div>';
    itemHtml+='<div class="cat-right"><div class="cat-amount">¥'+fn(d.revenue)+'</div><div class="cat-pct">'+p+'%</div></div>';
    itemHtml+='</div>';
    listEl.insertAdjacentHTML('beforeend',itemHtml+detailHtml);
  });
}

function toggleCatDetail(idx){
  var items=document.querySelectorAll('.cat-item.expandable');
  var item=document.querySelector('.cat-item[data-idx="'+idx+'"]');
  var detail=document.getElementById('catDetail_'+idx);
  if(!item||!detail)return;
  var isExpanded=item.classList.contains('expanded');
  items.forEach(function(it){it.classList.remove('expanded')});
  document.querySelectorAll('.cat-detail').forEach(function(d){d.classList.remove('show')});
  if(!isExpanded){
    item.classList.add('expanded');
    detail.classList.add('show');
  }
}

/* ========== 品类趋势对比 ========== */
function drawCompChart(days,startIdx,endIdx){
  var start,end;
  if(startIdx!==undefined&&endIdx!==undefined){start=startIdx;end=endIdx}
  else{start=days===0?0:Math.max(0,sum.length-days);end=sum.length-1}
  var ct={};
  for(var i=start;i<=end;i++){Object.keys(sum[i].categories).forEach(function(cat){ct[cat]=(ct[cat]||0)+sum[i].categories[cat].revenue})}
  var top=Object.entries(ct).sort(function(a,b){return b[1]-a[1]}).slice(0,6).map(function(e){return e[0]});
  var lb=[];for(var j=start;j<=end;j++)lb.push(dts[j].slice(5));
  var ctx=document.getElementById('catTrend').getContext('2d');if(cT)cT.destroy();
  cT=new Chart(ctx,{type:'bar',data:{labels:lb,datasets:top.map(function(cat){return{label:cat,data:(function(){var a=[];for(var j=start;j<=end;j++)a.push(sum[j].categories[cat]?sum[j].categories[cat].revenue:0);return a})(),backgroundColor:gc(cat).c+'66',borderColor:gc(cat).c,borderWidth:1.5,borderRadius:6}})},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',align:'end',labels:{color:'#7c8495',font:{size:10},boxWidth:10,padding:8,usePointStyle:true}},tooltip:{backgroundColor:'#1a1a2e',borderColor:'#e4e8ec',borderWidth:1,titleColor:'#fff',bodyColor:'#a0aec0',cornerRadius:8,callbacks:{label:function(ctx){return ctx.dataset.label+': ¥'+fn(ctx.parsed.y)}}}},scales:{x:{stacked:false,grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#7c8495',font:{size:10}}},y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#7c8495',font:{size:10},callback:function(v){return'¥'+(v/1000).toFixed(0)+'k'}}}}}});
}

/* ========== 门店排行（支持周期选择） ========== */
function drawStoreRank(start,end){
  var storeData={};
  for(var i=start;i<=end;i++){
    sum[i].store_ranking.forEach(function(sr){
      if(!storeData[sr.store])storeData[sr.store]={cat:sr.category,revenue:0,income:0,orders:0};
      storeData[sr.store].revenue+=sr.revenue;
      storeData[sr.store].income+=sr.income;
      storeData[sr.store].orders+=sr.orders;
    });
  }
  var arr=Object.entries(storeData).map(function(e){return{name:e[0],cat:e[1].cat,revenue:e[1].revenue,income:e[1].income,orders:e[1].orders}}).sort(function(a,b){return b.revenue-a.revenue});
  var n=end-start+1;
  var dl=n===1?(dts[start].slice(5)+' 周'+WD[new Date(dts[start]).getDay()]):(dts[start].slice(5)+'~'+dts[end].slice(5));
  document.getElementById('storeBadge').textContent=dl+' TOP 10';
  var t10=arr.slice(0,10),md=['🥇','🥈','🥉'];
  document.getElementById('storeList').innerHTML=t10.map(function(s,i){
    var c=gc(s.cat),rn=i<3?md[i]:'<span style="color:var(--fg-dim);font-family:DM Mono;font-size:13px;width:20px;display:inline-block;text-align:center">'+(i+1)+'</span>';
    var avgRev=n>1?' · 日均 ¥'+fn(s.revenue/n):'';
    return '<div class="cat-item" style="padding:10px 14px"><div style="width:28px;text-align:center;font-size:16px;flex-shrink:0">'+rn+'</div><div class="cat-info"><div class="cat-name" style="font-size:13px">'+s.name+'</div><div class="cat-stores">'+c.ic+' '+s.cat+avgRev+'</div></div><div class="cat-right"><div class="cat-amount" style="font-size:14px">¥'+fn(s.revenue)+'</div></div></div>';
  }).join('');
}

/* ========== 当日经营建议 ========== */
function drawInsights(idx,dy){
  var ins=[],cs=Object.entries(dy.categories).sort(function(a,b){return b[1].revenue-a[1].revenue}),tr=dy.total_revenue;
  var tp=cs[0],tpP=(tp[1].revenue/tr*100).toFixed(0);
  ins.push({t:'good',ti:'营收主力',tg:'表现优秀',tx:tp[0]+'以 ¥'+fn(tp[1].revenue)+' 占比 '+tpP+'%，是市场核心收入来源。'});
  var bt=cs[cs.length-1];
  if(bt[1].revenue/tr<0.03){ins.push({t:'warn',ti:'低营收品类',tg:'需关注',tx:bt[0]+'仅 ¥'+fn(bt[1].revenue)+'（'+(bt[1].revenue/tr*100).toFixed(1)+'%），建议评估调整。'})}
  var tdi=tr-Object.values(dy.categories).reduce(function(s,c){return s+c.income},0),dr2=(tdi/tr*100);
  if(dr2>10){ins.push({t:'warn',ti:'优惠率偏高',tg:'成本关注',tx:'当日优惠率 '+dr2.toFixed(1)+'%，折损 ¥'+fn(tdi)+'。'})}
  else if(dr2<3){ins.push({t:'good',ti:'优惠率健康',tg:'控制良好',tx:'优惠率仅 '+dr2.toFixed(1)+'%，控制良好。'})}
  if(idx>=5){
    var a3=(sum[idx].total_revenue+sum[idx-1].total_revenue+sum[idx-2].total_revenue)/3;
    var f3=(sum[0].total_revenue+sum[1].total_revenue+sum[2].total_revenue)/3;
    if(a3<f3*0.85){ins.push({t:'warn',ti:'营收下行',tg:'趋势预警',tx:'近3日日均 ¥'+fn(a3)+'，较前3日下降 '+((1-a3/f3)*100).toFixed(1)+'%。'})}
    else if(a3>f3*1.1){ins.push({t:'good',ti:'营收上升',tg:'积极信号',tx:'近3日日均 ¥'+fn(a3)+'，较前3日增长 '+((a3/f3-1)*100).toFixed(1)+'%。'})}
    else{ins.push({t:'info',ti:'营收平稳',tg:'正常波动',tx:'近3日日均 ¥'+fn(a3)+'，与前期持平。'})}
  }
  var top3Pct=0;for(var k=0;k<Math.min(3,cs.length);k++)top3Pct+=(cs[k][1].revenue/tr*100);
  if(top3Pct>70){ins.push({t:'info',ti:'品类集中度高',tg:'风险提示',tx:'前3大品类占 '+top3Pct.toFixed(0)+'%，集中度高。'})}
  else{ins.push({t:'info',ti:'品类结构均衡',tg:'结构良好',tx:'前3大品类占 '+top3Pct.toFixed(0)+'%，结构均衡。'})}
  var totalIAll=0,totalOAll=0;
  sum.forEach(function(d){Object.values(d.categories).forEach(function(c){totalIAll+=c.income;totalOAll+=c.orders})});
  var avgAll=totalOAll>0?totalIAll/totalOAll:0;
  var curI=Object.values(dy.categories).reduce(function(s,c){return s+c.income},0);
  var curO=Object.values(dy.categories).reduce(function(s,c){return s+c.orders},0);
  var avgNow=curO>0?curI/curO:0;
  if(avgNow<avgAll*0.8){ins.push({t:'warn',ti:'客单价偏低',tg:'消费提醒',tx:'当日 ¥'+avgNow.toFixed(0)+'，低于均值 ¥'+avgAll.toFixed(0)+'。'})}
  else if(avgNow>avgAll*1.2){ins.push({t:'good',ti:'客单价提升',tg:'积极信号',tx:'当日 ¥'+avgNow.toFixed(0)+'，高于均值 ¥'+avgAll.toFixed(0)+'。'})}
  var avgR=sum.reduce(function(s,d){return s+d.total_revenue},0)/sum.length;
  document.getElementById('tipText').innerHTML='日均营业额 <strong>¥'+fn(avgR)+'</strong>，当日 '+(dy.total_revenue>=avgR?'高于':'低于')+' 日均值。';
  document.getElementById('insightList').innerHTML=ins.map(function(o){
    return '<div class="insight-card '+o.t+'"><div class="insight-title">'+o.ti+' <span class="insight-tag '+o.t+'">'+o.tg+'</span></div><div class="insight-body">'+o.tx+'</div></div>';
  }).join('');
}

/* ========== 周期性经营分析 ========== */
function initCycleInsight(){
  var min=dts[0],max=dts[dts.length-1];
  var s=document.getElementById('insightStart'),e=document.getElementById('insightEnd');
  s.min=min;s.max=max;e.min=min;e.max=max;
  s.value=dts[Math.max(0,dts.length-3)];e.value=max;
  runCycleInsight();
}

function runCycleInsight(){
  var s=document.getElementById('insightStart').value;
  var e=document.getElementById('insightEnd').value;
  if(!s||!e){document.getElementById('cycleInsightList').innerHTML='<div class="tip-banner"><div class="tip-icon">📋</div><div class="tip-text">请选择日期范围</div></div>';return}
  var si=dts.indexOf(s),ei=dts.indexOf(e);
  if(si===-1||ei===-1){document.getElementById('cycleInsightList').innerHTML='<div class="tip-banner"><div class="tip-icon">📋</div><div class="tip-text">请选择有效日期</div></div>';return}
  var start=Math.min(si,ei),end=Math.max(si,ei),n=end-start+1;
  var totalRev=0,totalInc=0,totalOrd=0,catData={};
  for(var i=start;i<=end;i++){
    totalRev+=sum[i].total_revenue;
    Object.keys(sum[i].categories).forEach(function(cat){
      var c=sum[i].categories[cat];
      totalInc+=c.income;totalOrd+=c.orders;
      if(!catData[cat])catData[cat]={rev:0,inc:0,ord:0,days:0};
      catData[cat].rev+=c.revenue;catData[cat].inc+=c.income;catData[cat].ord+=c.orders;catData[cat].days++;
    });
  }
  var avgRev=totalRev/n,avgOrd=totalOrd/n,avgPrice=avgOrd>0?(totalInc/n)/avgOrd:0;
  var dl=dts[start].slice(5)+' ~ '+dts[end].slice(5);
  var ins=[];
  ins.push({t:'info',ti:'📊 '+dl+' 总览',tg:'概览',tx:n+'天，总营业额 ¥'+fn(totalRev)+'，日均 ¥'+fn(avgRev)+'，日均 '+Math.round(avgOrd)+' 单，客单价 ¥'+avgPrice.toFixed(0)+'。'});
  if(n>=4){
    var half=Math.floor(n/2),f1=0,f2=0;
    for(var i=start;i<start+half;i++)f1+=sum[i].total_revenue;
    for(var i=start+half;i<=end;i++)f2+=sum[i].total_revenue;
    var a1=f1/half,a2=f2/(n-half),chg=((a2-a1)/a1*100);
    if(chg>5)ins.push({t:'good',ti:'📈 营收上升',tg:'趋势',tx:'后半周期日均 ¥'+fn(a2)+'，较前半增长 '+chg.toFixed(1)+'%。'});
    else if(chg<-5)ins.push({t:'warn',ti:'📉 营收下降',tg:'趋势',tx:'后半周期日均 ¥'+fn(a2)+'，较前半下降 '+Math.abs(chg).toFixed(1)+'%。'});
    else ins.push({t:'info',ti:'➡️ 营收持平',tg:'趋势',tx:'前后半周期基本持平（¥'+fn(a1)+' vs ¥'+fn(a2)+'）。'});
  }
  var catArr=Object.entries(catData).sort(function(a,b){return b[1].rev-a[1].rev});
  ins.push({t:'good',ti:'🏆 冠军品类',tg:catArr[0][0],tx:catArr[0][0]+'累计 ¥'+fn(catArr[0][1].rev)+'（日均 ¥'+fn(catArr[0][1].rev/catArr[0][1].days)+'），占 '+((catArr[0][1].rev/totalRev)*100).toFixed(1)+'%。'});
  var btm=catArr[catArr.length-1];
  if(btm[1].rev/totalRev<0.03)ins.push({t:'warn',ti:'⚠️ 弱势品类',tg:btm[0],tx:btm[0]+'累计仅 ¥'+fn(btm[1].rev)+'，建议评估调整。'});
  if(n>=2){
    var fD={},lD={};
    Object.keys(sum[start].categories).forEach(function(cat){fD[cat]=sum[start].categories[cat].revenue});
    Object.keys(sum[end].categories).forEach(function(cat){lD[cat]=sum[end].categories[cat].revenue});
    catArr.slice(0,5).forEach(function(e){
      var cat=e[0],fv=fD[cat]||0,lv=lD[cat]||0;
      if(fv>0){var c2=((lv-fv)/fv*100);if(c2>10)ins.push({t:'good',ti:cat+' 增长',tg:'对比',tx:'从 ¥'+fn(fv)+' 增至 ¥'+fn(lv)+'（+'+c2.toFixed(1)+'%）。'});else if(c2<-10)ins.push({t:'warn',ti:cat+' 下滑',tg:'对比',tx:'从 ¥'+fn(fv)+' 降至 ¥'+fn(lv)+'（'+c2.toFixed(1)+'%）。'})}
    });
  }
  var totalDisc=totalRev-totalInc,discRate=(totalDisc/totalRev*100);
  if(discRate>8)ins.push({t:'warn',ti:'💰 优惠率偏高',tg:'成本',tx:'周期平均优惠率 '+discRate.toFixed(1)+'%，折损 ¥'+fn(totalDisc)+'。'});
  else if(discRate<3)ins.push({t:'good',ti:'💰 优惠率健康',tg:'控制良好',tx:'周期平均优惠率仅 '+discRate.toFixed(1)+'%。'});
  document.getElementById('cycleInsightList').innerHTML=ins.map(function(o){
    return '<div class="insight-card '+o.t+'"><div class="insight-title">'+o.ti+' <span class="insight-tag '+o.t+'">'+o.tg+'</span></div><div class="insight-body">'+o.tx+'</div></div>';
  }).join('');
}

initCycleInsight();

/* ---------- 工具函数 ---------- */
function addDays(ds,d){var dt=new Date(ds);dt.setDate(dt.getDate()+d);return dt.toISOString().slice(0,10)}
function fM(v){return v.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2})}

function getMonthData(y,m){var r={rev:0,inc:0,ord:0,days:0,cats:{}};sum.forEach(function(s){var dy=new Date(s.date);if(dy.getFullYear()===y&&dy.getMonth()===m){r.rev+=s.total_revenue;r.days++;Object.keys(s.categories).forEach(function(c){var cat=s.categories[c];r.inc+=cat.income;r.ord+=cat.orders;if(!r.cats[c])r.cats[c]=0;r.cats[c]+=cat.revenue})}});return r}

function getWeeksOfMonth(y,m){
  var ws=[],first=new Date(y,m,1),last=new Date(y,m+1,0),cur=new Date(first);
  while(cur<=last){
    var wk=[],dow=cur.getDay()||7,ws2=new Date(cur);ws2.setDate(cur.getDate()-(dow-1));
    for(var i=0;i<7;i++){var dd=new Date(ws2);dd.setDate(ws2.getDate()+i);if(dd.getMonth()===m)wk.push(dd.toISOString().slice(0,10))}
    if(wk.length)ws.push({days:wk});
    cur.setDate(cur.getDate()+7);
  }
  return ws;
}

  }else{
    var sug=Math.round(dAct*dim);
    r+='<p class="rpt-p">按当前日均 ¥'+fM(dAct)+' 推算，本月预计可达 <strong>¥'+fM(sug)+'</strong>。建议设定月度目标（在「目标」页面设置），系统将据此生成更精准的营销方案。</p>';
  }
  r+='</div>';

  /* 二、品类表现分析 */
  r+='<div class="rpt-section"><div class="rpt-section-title"><span class="st-num">2</span>品类表现分析</div>';
  var allCats=Object.keys(cd.cats).sort(function(a,b){return cd.cats[b]-cd.cats[a]});
  if(allCats.length>0){
    var topCat=allCats[0],topPct=(cd.cats[topCat]/cd.rev*100).toFixed(1);
    r+='<p class="rpt-p">本月共经营 <strong>'+allCats.length+'</strong> 个品类，';
    r+'<em>'+topCat+'</em> 以 ¥'+fM(cd.cats[topCat])+' 占比 '+topPct+'%，是市场营收主力。';
    var top3=allCats.slice(0,3),top3Pct=0;
    top3.forEach(function(c){top3Pct+=cd.cats[c]/cd.rev*100});
    r+='前三大品类（'+top3.join('、')+'）合计占比 <strong>'+top3Pct.toFixed(0)+'%</strong>。';
    r+='</p>';

    if(pd.days>0){
      r+='<div style="margin-top:8px">';
      var downCats=[],upCats=[];
      allCats.forEach(function(c){
        var cv=cd.cats[c]||0,pv=pd.cats[c]||0;
        if(pv>0){
          var ch=(cv-pv)/pv*100;
          if(ch<-5)downCats.push({n:c,ch:ch});
          else if(ch>5)upCats.push({n:c,ch:ch});
        }
      });
      if(downCats.length>0){
        downCats.sort(function(a,b){return a.ch-b.ch});
        r+='<p class="rpt-p"><strong class="warn">⚠ 下滑品类：</strong>'+downCats.map(function(c){return c.n+'（'+c.ch.toFixed(1)+'%）'}).join('、')+'</p>';
        downCats.forEach(function(c){
          var cfg=gc(c),adv=CAT_REPORT[c.n];
          r+='<div class="rpt-cat-item"><div class="rpt-cat-icon" style="background:'+cfg.bg+'">'+cfg.ic+'</div><div class="rpt-cat-body"><div class="rpt-cat-name">'+c.n+' ↓ '+c.ch.toFixed(1)+'%</div>';
          if(adv)r+='<div class="rpt-cat-text">'+adv.down+'</div>';
          r+='</div></div>';
        });
      }
      if(upCats.length>0){
        upCats.sort(function(a,b){return b.ch-a.ch});
        r+='<p class="rpt-p" style="margin-top:10px"><strong style="color:var(--accent-dark)">✅ 增长品类：</strong>'+upCats.map(function(c){return c.n+'（+'+c.ch.toFixed(1)+'%）'}).join('、')+'</p>';
        upCats.forEach(function(c){
          var cfg=gc(c),adv=CAT_REPORT[c.n];
          r+='<div class="rpt-cat-item"><div class="rpt-cat-icon" style="background:'+cfg.bg+'">'+cfg.ic+'</div><div class="rpt-cat-body"><div class="rpt-cat-name">'+c.n+' ↑ +'+c.ch.toFixed(1)+'%</div>';
          if(adv)r+='<div class="rpt-cat-text">'+adv.up+'</div>';
          r+='</div></div>';
        });
      }
      if(!downCats.length&&!upCats.length)r+='<p class="rpt-p">各品类表现基本平稳，环比无显著变化。</p>';
      r+='</div>';
    }
  }else{
    r+='<p class="rpt-p">暂无品类数据。</p>';
  }
  r+='</div>';

  /* 三、节日影响评估 */
  r+='<div class="rpt-section"><div class="rpt-section-title"><span class="st-num">3</span>节日影响评估</div>';
  var allH=getHolidaysInRange(dts[0]||mk+'-01',dts[dts.length-1]||mk+'-31');
  if(allH.length>0){
    allH.forEach(function(h){
      var inR=dts.indexOf(h.d)!==-1;
      r+='<div class="rpt-hol-item"><div class="rpt-hol-name">'+h.ic+' '+h.n+'（'+h.d.slice(5)+'）'+(inR?' ✅ 已在数据周期内':' → 影响窗口内')+'</div>';
      r+='<div class="rpt-hol-text">'+h.desc+'。受影响品类：'+h.cats.join('、')+'。预计消费影响系数：+'+Math.round(h.imp*0.3)+'%。</div></div>';
    });
  }else{
    r+='<p class="rpt-p">当前数据周期内无重大节日影响，经营数据反映的是常规消费水平。</p>';
  }
  if(upHols.length>0){
    r+='<p class="rpt-p" style="margin-top:10px"><strong>近期节日预告：</strong>';
    r+=upHols.map(function(h){var d=Math.ceil((new Date(h.d)-new Date())/864e5);return h.ic+h.n+'（'+d+'天后）'}).join('、');
    r+='。请提前做好备货和营销准备。</p>';
  }
  r+='</div>';

  /* 四、营销策略建议 */
  r+='<div class="rpt-section"><div class="rpt-section-title"><span class="st-num">4</span>营销策略建议</div>';

  var strategies=[];

  /* 基于目标差距的策略 */
  if(tgt){
    var rate=cd.rev>0?(cd.rev/tgt.revenue*100):0;
    if(rate<50){
      strategies.push({type:'danger',text:'当前达成率不足50%，建议立即采取以下紧急措施：① 开展全场满减促销（满50减5、满100减12），降低消费门槛；② 设置每日特价摊位（每天2-3个品类轮换），提升客流和转化率；③ 联合周边社区开展团购活动，扩大客源覆盖范围。'});
      strategies.push({type:'danger',text:'同时建议增加营业时段促销力度：早市（6:00-8:00）设置早餐套餐特价，午市（11:00-13:00）推出便当食材套餐，晚市（17:00-19:00）设置生鲜清仓折扣。'});
    }else if(rate<80){
      strategies.push({type:'highlight',text:'达成率尚有差距，建议：① 针对下滑品类设置周末促销活动，搭配赠品或满减刺激消费；② 推出"每日一特价"活动，轮流推广各品类，保持市场活跃度；③ 加强社群运营（微信群/朋友圈），定期推送特价信息和食谱推荐。'});
    }else{
      strategies.push({type:'success',text:'目标达成进度良好。建议保持当前经营节奏，同时可适度优化：① 优化品类结构，适当增加高毛利品类占比；② 推出会员积分制度或储值优惠，提升顾客粘性和复购率；③ 定期收集顾客反馈，持续改善购物体验。'});
    }
  }

  /* 基于下滑品类的策略 */
  var downCats2=[];
  if(pd.days>0){
    allCats.forEach(function(c){
      var cv=cd.cats[c]||0,pv=pd.cats[c]||0;
      if(pv>0&&(cv-pv)/pv<-0.15)downCats2.push(c);
    });
  }
  if(downCats2.length>0){
    var names=downCats2.slice(0,3).join('、');
    strategies.push({type:'highlight',text:'重点品类（'+names+'）环比下滑超过15%，建议专项制定品类提升计划：① 分析下滑原因（价格、品质、品种、竞争？）；② 与商户沟通制定针对性促销方案；③ 设置品类专区，提升品类曝光度和购物便利性。'});
  }

  /* 基于节日的策略 */
  if(upHols.length){
    var nextH=upHols[0];
    var daysH=Math.ceil((new Date(nextH.d)-new Date())/864e5);
    if(daysH<=30&&nextH.imp>=70){
      strategies.push({type:'highlight',text:'<strong>'+nextH.ic+' '+nextH.n+'（'+daysH+'天后）营销方案：</strong>① 提前'+Math.min(nextH.bf,15)+'天开始加大'+nextH.cats.slice(0,3).join('、')+'等核心品类的备货量，确保库存充足；② 设计节日促销海报，提前一周张贴于市场入口及周边社区；③ 推出节日专属套餐组合（如'+nextH.cats[0]+'+'+nextH.cats[1]+'搭配优惠）；④ 布置节日装饰，营造消费氛围，延长营业时间。'});
    }else if(daysH<=60&&nextH.imp>=50){
      strategies.push({type:'info',text:'<strong>'+nextH.ic+' '+nextH.n+'（'+daysH+'天后）</strong>预计消费增幅+'+Math.round(nextH.imp*0.3)+'%。建议提前规划'+nextH.cats.slice(0,2).join('、')+'备货方案，与供应商确认供货能力。'});
    }
  }

  /* 常规优化策略 */
  strategies.push({type:'info',text:'常态化运营建议：① 每周统计各品类坪效数据，优化摊位布局和品类组合；② 建立顾客微信群，定期推送特价信息和食谱推荐；③ 关注周边竞品动态，及时调整经营策略；④ 加强商户服务培训，提升顾客购物体验和满意度。'});

  strategies.forEach(function(s){
    r+='<div class="rpt-'+s.type+'">'+s.text+'</div>';
  });
  r+='</div>';

  /* 五、下周行动计划 */
  r+='<div class="rpt-section"><div class="rpt-section-title"><span class="st-num">5</span>下周行动计划</div>';
  var actions=genReportActions(cd,tgt,cm);
  actions.forEach(function(a,i){
    r+='<div class="rpt-action"><div class="rpt-action-num">'+(i+1)+'</div><div class="rpt-action-text">'+a+'</div></div>';
  });
  r+='</div>';

  /* 报告尾 */
  r+='<div class="rpt-footer">本报告由妫汭市集营业看板自动生成<br>数据基于客如云POS系统 · '+now.toLocaleDateString('zh-CN')+'</div>';
  r+='</div>';

  document.getElementById('planReport').innerHTML=r;
}

function genReportActions(cd,tgt,cm){
  var acts=[],mk=mKey(cm.y,cm.m);
  var rate=tgt&&cd.rev>0?(cd.rev/tgt.revenue*100):0;
  var dAct=cd.days>0?(cd.rev/cd.days):0;

  /* 根据目标 */
  if(!tgt){
    acts.push('在「目标」页面设定本月营业额目标，以便系统生成精准的营销方案和进度追踪。');
  }
  if(tgt&&rate<50){
    acts.push('立即开展全品类促销活动：设置每日2-3个特价品类，配合满50减5优惠，提升客流和客单价。');
    acts.push('联合周边社区开展宣传推广：制作市场宣传单页，在周边小区发放；启动微信群运营，每日推送特价信息。');
    acts.push('召开商户沟通会：通报本月经营数据，与各品类商户协商制定促销方案，明确责任和目标。');
    acts.push('延长营业时段促销：增设晚市（17:00-19:00）生鲜清仓折扣，吸引下班客流。');
  }else if(tgt&&rate<80){
    acts.push('针对环比下滑品类制定专项促销方案：设置品类专区，配合试吃活动和组合优惠。');
    acts.push('推出"每日一特价"活动：每天选择1-2个品类做特价，轮流推广，保持市场活跃度和顾客新鲜感。');
    acts.push('启动社群运营：建立顾客微信群，每日推送特价信息和时令食谱推荐，提升顾客粘性和复购率。');
  }else{
    acts.push('巩固当前经营成果：保持品类品质和供应稳定，持续关注各品类坪效数据，优化布局。');
    acts.push('探索增值服务：推出会员积分、储值优惠等制度，提升顾客粘性和复购率。');
  }

  /* 节日相关 */
  var upH=getUpcomingHolidays(2);
  if(upH.length){
    var nx=upH[0],daysNx=Math.ceil((new Date(nx.d)-new Date())/864e5);
    if(daysNx<=15&&nx.imp>=50){
      acts.push('['+nx.n+'备货] 提前协调'+nx.cats.slice(0,3).join('、')+'供应商确认供货量和价格，确保节前库存充足。');
      acts.push('['+nx.n+'宣传] 设计制作节日促销海报和宣传物料，提前张贴于市场入口及周边社区公告栏。');
      acts.push('['+nx.n+'氛围] 布置节日装饰，营造消费氛围，考虑设置'+nx.cats[0]+'+'+nx.cats[1]+'节日专区。');
    }else if(daysNx<=30){
      acts.push('['+nx.n+'规划] 提前规划'+nx.cats.slice(0,2).join('、')+'备货方案，与供应商初步沟通供货能力。');
    }
  }

  /* 常规 */
  acts.push('每周一上午汇总上周经营数据，分析品类表现趋势，及时调整经营策略。');
  acts.push('关注周边竞品动态（新建市场、社区团购等），及时了解市场变化并制定应对措施。');

  return acts;
}</script>
